version: '3.8'

services:
  forensic-server:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:///server.db
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_ACCESS_TOKEN_EXPIRES_HOURS=12
      - JWT_REFRESH_TOKEN_EXPIRES_DAYS=30
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - USE_AD=false
      # Set FORENSIC_PG_DSN to enable PostgreSQL enterprise mode.
      # Points to pgbouncer when using the full stack (recommended for production).
      # - FORENSIC_PG_DSN=postgresql://forensic_user:forensic_password@pgbouncer:6432/forensic_db
    volumes:
      - ./logs:/app/logs
      - ./server.db:/app/server.db
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL — enterprise persistent store
  # Default credentials are for local development only.
  # For production override via environment variables or secrets.
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forensic_db}
      POSTGRES_USER: ${POSTGRES_USER:-forensic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forensic_password_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forensic_user} -d ${POSTGRES_DB:-forensic_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # pgbouncer — connection pooler sitting in front of PostgreSQL
  # Routes app connections through a fixed-size pool, reducing DB load.
  # Pool mode: transaction  →  each DB connection is released after each txn,
  # allowing many app connections to share a small number of server connections.
  # ──────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:latest
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-forensic_db}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-forensic_user}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-forensic_password_change_me}
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-forensic_db}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_TIMEOUT: 5
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 300
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: 300
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

