[mypy]
# MyPy type checking configuration for Forensic Report Writer
# Run with: mypy . --ignore-missing-imports

python_version = 3.9

# Reporting options
ignore_missing_imports = True
show_error_context = True
show_error_codes = True
show_column_numbers = True

# Strictness options (gradually increasing)
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_no_return = True
warn_unused_ignores = True

# Don't enforce strict by default (too many changes needed at once)
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True

# Per-module options - these files need more strictness
[mypy-database]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-validators]
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-logging_config]
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-main]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-case_tab]
disallow_untyped_defs = False
check_untyped_defs = True

# Exclude test files and build directories
[mypy]
exclude = (?x)(
    ^build/
    | ^__pycache__/
    | ^\.
    | ^tests/
)

# Allow errors in third-party libraries without stubs
[mypy-requests.*]
ignore_missing_imports = True

[mypy-PyQt5.*]
ignore_missing_imports = True

[mypy-sqlite3.*]
ignore_missing_imports = True
